events {}

http {
    upstream backend_api { # définition d'un groupe de serveurs backend pour le load balancing
        server backend:3000;
    }

    server {
        listen 80;

        location / {
            # renvoyer trafic
            proxy_pass http://backend_api;
            # headers pour la transmission des informations du client
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}