services:
  nodered:
    build: ./nodered
    container_name: nodered
    ports:
      - "1880:1880"
    environment:
      - TZ=Europe/Paris
    depends_on:
      - mysql
      - mosquitto
    volumes:
      - ./nodered-data:/data
    networks:
      - iotnet

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nodered
      MYSQL_USER: nodered
      MYSQL_PASSWORD: noderedpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - iotnet

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto-config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - ./mosquitto-logs:/mosquitto/log
    networks:
      - iotnet

  backend:
    build: ./backend
    container_name: backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=mysql
      - DB_USER=nodered
      - DB_PASSWORD=noderedpassword
      - DB_NAME=nodered
      - MQTT_BROKER=mosquitto
    depends_on:
      - mysql
      - mosquitto
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - iotnet

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - iotnet

  db-sonar:
    image: postgres:15
    container_name: db-sonar
    restart: always
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    networks:
      - iotnet

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    restart: always
    depends_on:
      - db-sonar
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db-sonar:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs
    networks:
      - iotnet

  monitor:
    image: nicolargo/glances:latest-full
    container_name: monitor
    restart: always
    pid: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - GLANCES_OPT=-w
    ports:
      - "61208:61208"
    networks:
      - iotnet

networks:
  iotnet:

volumes:
  nodered_data:
  mysql_data:
  mosquitto_data:
  sonar_data:
  sonar_extensions:
  sonar_logs:
  sonar_db_data: